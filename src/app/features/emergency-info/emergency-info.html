<h1>Emergency Info of Jane Doe</h1>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h2>Blood Type</h2>
    <app-blood-type formControlName="bloodType" />

    <h2>Medications</h2>
    @for (row of medicationRows; track row) {
        <app-medication (addMedication)="onMedicationAdded($event)" />
    }

    <button matButton="filled" type="submit">Save</button>
</form>
