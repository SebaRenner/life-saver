<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="mandatory-fields">
    <mat-form-field appearance="outline">
        <mat-label>Medication name</mat-label>
        <input matInput formControlName="name" placeholder="Enter medication name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Dosage</mat-label>
        <input matInput type="number" formControlName="dosage" placeholder="e.g. 50" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Unit</mat-label>
        <input matInput formControlName="unit" placeholder="e.g. mg" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Frequency</mat-label>
        <input matInput formControlName="frequency" placeholder="e.g. Twice a day" />
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Reason</mat-label>
    <textarea 
      matInput 
      formControlName="reason" 
      rows="1" 
      [maxlength]="maxReasonLength" 
      placeholder="Why are you taking this medication?">
    </textarea>
  </mat-form-field>

  <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || form.disabled">
    Add medication
  </button>
</form>
